image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

# Region the shared ALB / platform runs in. Cedar-auth needs this to fetch the
# ALB's JWT-signing public key (public-keys.auth.elb.<region>.amazonaws.com) —
# EKS pods don't get AWS_REGION for free the way Lambda does.
awsRegion: ""

service:
  port: 80
  containerPort: 8080

replicas: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Container-level security context. Override in your service's values.yaml only
# if you have a concrete reason (e.g. need to bind to a privileged port).
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

ingress:
  host: ""
  certificateArn: ""
  cognitoUserPoolArn: ""
  cognitoClientId: ""
  cognitoUserPoolDomain: ""
